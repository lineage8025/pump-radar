---
# Portainer git-stack 部署用（Synology NAS，模式同 crypto-pulse）。
# 唯一 bind：logs（journal / state 落地，File Station 可見）。webhook 由 stack env 注入，不進版控。
services:
  pump-radar:
    build: .
    image: pump-radar:latest
    container_name: pump-radar
    restart: unless-stopped
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      # 2026-07-07 擴編 10 標的：加速 forward 樣本累積（偵測參數不變，詳 DETECTOR_PREREG）
      - PAIRS=${PAIRS:-BTC/USDT,ETH/USDT,ADA/USDT,SOL/USDT,XRP/USDT,DOGE/USDT,BNB/USDT,LINK/USDT,LTC/USDT,AVAX/USDT}
      - EXCHANGE=${EXCHANGE:-binance}
    volumes:
      - /volume1/docker/pump-radar/logs:/app/logs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - while true; do python /app/scripts/pump_detect.py; sleep 60; done

  # 每日結果日報 sidecar：sh 迴圈每 ~25 分喚起，腳本自判「過了台北 09:00 且 marker 過期」
  # 才聚合並發 dispatch[daily-pulse]（GitHub Actions 上的 Claude 寫日報推 Discord）。
  # 無新訊號且無新結算的安靜日自動跳過。缺 dispatch env 時 no-op，不影響偵測主流程。
  pump-radar-pulse:
    image: pump-radar:latest
    container_name: pump-radar-pulse
    restart: unless-stopped
    depends_on:
      - pump-radar
    environment:
      - GITHUB_DISPATCH_TOKEN=${GITHUB_DISPATCH_TOKEN:-}
      - GITHUB_DISPATCH_REPO=${GITHUB_DISPATCH_REPO:-}
    volumes:
      - /volume1/docker/pump-radar/logs:/app/logs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - while true; do python /app/scripts/daily_pulse_dispatch.py; sleep 1500; done
